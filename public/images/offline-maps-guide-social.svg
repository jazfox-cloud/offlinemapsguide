<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Offline Maps Guide social sharing image</title>
  <desc id="description">Brand graphic with an abstract route and offline status card for practical no-signal travel navigation guides.</desc>
  <defs>
    <linearGradient id="pageGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5ef"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <linearGradient id="mapWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f2ed"/>
      <stop offset="1" stop-color="#f1e7cf"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.72"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#17201b" flood-opacity="0.13"/>
    </filter>
    <clipPath id="mapClip">
      <rect x="724" y="76" width="404" height="478" rx="20"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#pageGlow)"/>
  <circle cx="110" cy="555" r="210" fill="#0d7c66" opacity="0.045"/>
  <circle cx="1135" cy="30" r="180" fill="#d84f2a" opacity="0.055"/>

  <g transform="translate(72 70)">
    <rect width="52" height="52" rx="12" fill="#17201b"/>
    <circle cx="26" cy="26" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M26 11v8M26 33v8M11 26h8M33 26h8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="26" cy="26" r="2.5" fill="#0d7c66"/>
  </g>

  <text x="72" y="184" fill="#0d7c66" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" letter-spacing="2.2">PRACTICAL TRAVEL NAVIGATION</text>
  <text x="72" y="286" fill="#17201b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-1.8">Offline Maps</text>
  <text x="72" y="370" fill="#17201b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="800" letter-spacing="-1.8">Guide</text>
  <text x="76" y="434" fill="#5e6b63" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500">Practical setup guides for reliable navigation</text>
  <text x="76" y="473" fill="#5e6b63" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500">when mobile data or signal is unavailable.</text>
  <g transform="translate(76 520)">
    <rect width="178" height="40" rx="20" fill="#ffffff" stroke="#d9ded6"/>
    <circle cx="22" cy="20" r="7" fill="#0d7c66"/>
    <text x="40" y="26" fill="#17201b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="700">No-signal ready</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="724" y="76" width="404" height="478" rx="20" fill="#ffffff" stroke="#d9ded6"/>
  </g>
  <g clip-path="url(#mapClip)">
    <rect x="724" y="76" width="404" height="328" fill="url(#mapWash)"/>
    <rect x="724" y="76" width="404" height="328" fill="url(#grid)"/>
    <path d="M680 314 C790 248 842 190 920 198 C1008 206 1036 118 1172 108" fill="none" stroke="#0d7c66" stroke-width="20" stroke-linecap="round" opacity="0.34"/>
    <path d="M738 92 C812 166 842 260 910 286 C980 312 1040 272 1146 346" fill="none" stroke="#d84f2a" stroke-width="15" stroke-linecap="round" opacity="0.32"/>
    <path d="M824 48 C846 172 836 258 866 412" fill="none" stroke="#243c74" stroke-width="12" stroke-linecap="round" opacity="0.22"/>
    <circle cx="950" cy="230" r="47" fill="#d84f2a" stroke="#ffffff" stroke-width="5"/>
    <path d="M950 211v31M937 230l13 13 13-13" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="724" y="404" width="404" height="150" fill="#ffffff"/>
    <text x="758" y="452" fill="#5e6b63" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">SIGNAL</text>
    <text x="1088" y="452" fill="#17201b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" text-anchor="end">NO SERVICE</text>
    <text x="758" y="499" fill="#5e6b63" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700">TRIP NOTES</text>
    <text x="1088" y="499" fill="#17201b" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" text-anchor="end">SAVED LOCALLY</text>
  </g>
</svg>
